services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      GROQ_API_KEY: ${GROQ_API_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
      PERFORMANCE_ADMIN_TOKEN: ${PERFORMANCE_ADMIN_TOKEN:-}
